<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knut Sync</title>
    <style>
      :root {
        --bg: #050506;
        --bg-card: #111113;
        --bg-hover: #1a1a1f;
        --border: #242428;
        --text: #f4f4f5;
        --text-muted: #a1a1aa;
        --text-dim: #71717a;
        --green: #22c55e;
        --green-dim: #166534;
        --orange: #f59e0b;
        --red: #ef4444;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        -webkit-app-region: drag;
        user-select: none;
      }

      .container {
        padding: 20px;
        max-width: 480px;
        margin: 0 auto;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      .header h1 {
        font-size: 20px;
        font-weight: 700;
      }

      .header .version {
        font-size: 12px;
        color: var(--text-dim);
      }

      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 12px;
        -webkit-app-region: no-drag;
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .card-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 600;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .status-connected .status-dot { background: var(--green); }
      .status-disconnected .status-dot { background: var(--text-dim); }
      .status-syncing .status-dot { background: var(--orange); animation: pulse 1s infinite; }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: opacity 0.15s;
      }

      .btn:hover { opacity: 0.85; }
      .btn:active { opacity: 0.7; }

      .btn-primary {
        background: var(--green);
        color: #000;
      }

      .btn-secondary {
        background: var(--border);
        color: var(--text);
      }

      .btn-danger {
        background: transparent;
        color: var(--red);
        border: 1px solid var(--red);
      }

      .btn-block {
        width: 100%;
      }

      .auth-section {
        text-align: center;
      }

      .auth-section p {
        color: var(--text-muted);
        font-size: 14px;
        margin-bottom: 16px;
      }

      .device-code {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 16px;
        margin: 16px 0;
        text-align: center;
      }

      .device-code .code {
        font-size: 32px;
        font-weight: 700;
        font-family: monospace;
        letter-spacing: 0.2em;
        color: var(--green);
      }

      .device-code .instructions {
        font-size: 13px;
        color: var(--text-muted);
        margin-top: 8px;
      }

      .device-code a {
        color: var(--green);
        text-decoration: none;
      }

      .provider-list {
        list-style: none;
      }

      .provider-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
      }

      .provider-item:last-child {
        border-bottom: none;
      }

      .provider-info {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .provider-icon {
        width: 32px;
        height: 32px;
        background: var(--border);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }

      .provider-name {
        font-size: 14px;
        font-weight: 500;
      }

      .provider-status {
        font-size: 12px;
        color: var(--text-dim);
      }

      .toggle {
        position: relative;
        width: 40px;
        height: 22px;
        background: var(--border);
        border-radius: 11px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .toggle.active {
        background: var(--green);
      }

      .toggle::after {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        width: 18px;
        height: 18px;
        background: white;
        border-radius: 50%;
        transition: transform 0.2s;
      }

      .toggle.active::after {
        transform: translateX(18px);
      }

      .sync-info {
        font-size: 13px;
        color: var(--text-muted);
      }

      .sync-info .time {
        color: var(--text);
        font-weight: 500;
      }

      .footer {
        margin-top: 24px;
        text-align: center;
        font-size: 12px;
        color: var(--text-dim);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Knut Sync</h1>
        <span class="version">v0.1.0</span>
      </div>

      <div id="auth-card" class="card">
        <!-- Auth UI will be injected here -->
      </div>

      <div id="providers-card" class="card" style="display: none;">
        <div class="card-header">
          <span class="card-title">Providers</span>
          <span id="sync-status" class="status status-disconnected">
            <span class="status-dot"></span>
            <span>Not synced</span>
          </span>
        </div>
        <ul id="provider-list" class="provider-list">
          <!-- Providers will be injected here -->
        </ul>
      </div>

      <div id="sync-card" class="card" style="display: none;">
        <div class="card-header">
          <span class="card-title">Sync</span>
        </div>
        <div id="sync-info" class="sync-info">
          Last synced: <span class="time">Never</span>
        </div>
        <button id="sync-btn" class="btn btn-primary btn-block" style="margin-top: 12px;">
          Sync Now
        </button>
      </div>

      <div class="footer">
        Knut Sync runs in the background to keep your usage data up to date.
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
